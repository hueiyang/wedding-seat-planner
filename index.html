<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f6d58" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="囍座位規劃" />
    <title>囍座位規劃</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=wedding-planner-36" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主要導覽">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">囍</div>
          <div>
            <h1>囍座位規劃</h1>
            <p>婚宴賓客工作台</p>
          </div>
        </div>

        <button class="mobile-nav-button" id="mobileNavButton" type="button" aria-controls="navList" aria-expanded="false">
          <span id="mobileNavLabel">座位圖</span>
          <span data-icon="menu"></span>
        </button>

        <nav class="nav-list" id="navList">
          <button class="nav-item active" data-view="seating" type="button">
            <span data-icon="layout"></span>
            <span>座位圖</span>
          </button>
          <button class="nav-item" data-view="guests" type="button">
            <span data-icon="users"></span>
            <span>賓客名單</span>
          </button>
          <button class="nav-item" data-view="invitations" type="button">
            <span data-icon="mail"></span>
            <span>喜帖管理</span>
          </button>
          <button class="nav-item" data-view="gifts" type="button">
            <span data-icon="gift"></span>
            <span>禮金紀錄</span>
          </button>
          <button class="nav-item" data-view="tables" type="button">
            <span data-icon="table"></span>
            <span>桌次管理</span>
          </button>
        </nav>

        <section class="event-card" aria-label="婚禮資訊">
          <div class="event-card-header">
            <p id="eventLabel">婚禮資訊</p>
            <button class="sidebar-icon-button" id="openSettingsButton" type="button" aria-label="編輯基本設定" title="編輯基本設定">
              <span data-icon="settings"></span>
            </button>
          </div>
          <strong id="eventName">文定 & 婚宴</strong>
          <span id="eventDate">2026/11/21 18:00</span>
          <span id="eventVenue">台北文華東方酒店 3F 宴會廳</span>
        </section>

        <div class="account-card">
          <span class="avatar" id="accountAvatar">林</span>
          <div>
            <strong id="accountName">林小美 & 陳大明</strong>
            <span id="accountStatus">本機自動保存</span>
          </div>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div class="topbar-title">
            <p class="date-label" id="todayLabel"></p>
            <h2 id="viewTitle">座位圖</h2>
            <button class="mobile-tools-button" id="mobileToolsButton" type="button" aria-controls="topbarActions" aria-expanded="false">
              <span data-icon="settings"></span>
              <span>工具</span>
            </button>
          </div>
          <div class="topbar-actions" id="topbarActions">
            <input id="importFile" type="file" accept=".csv,text/csv" hidden />
            <button class="secondary-action" id="importButton" type="button">
              <span data-icon="upload"></span>
              <span>匯入名單</span>
            </button>
            <button class="secondary-action" id="templateButton" type="button">
              <span data-icon="download"></span>
              <span>下載樣板</span>
            </button>
            <button class="secondary-action" id="exportButton" type="button">
              <span data-icon="archive"></span>
              <span>匯出名單</span>
            </button>
            <input id="restoreFile" type="file" accept=".json,application/json" hidden />
            <div class="backup-actions" aria-label="資料安全">
              <button class="secondary-action" id="backupButton" type="button">
                <span data-icon="download"></span>
                <span>備份資料</span>
              </button>
              <button class="secondary-action" id="restoreButton" type="button">
                <span data-icon="upload"></span>
                <span>還原備份</span>
              </button>
              <button class="secondary-action" id="snapshotButton" type="button">
                <span data-icon="archive"></span>
                <span>快照</span>
              </button>
              <button class="secondary-action" id="cloudSyncButton" type="button">
                <span data-icon="cloud"></span>
                <span>雲端同步</span>
              </button>
              <span class="backup-status" id="backupStatus">尚未備份</span>
              <span class="cloud-status" id="cloudSyncStatus">本機模式</span>
            </div>
            <button class="primary-action" id="addTableButton" type="button">
              <span data-icon="plus"></span>
              <span>新增桌次</span>
            </button>
            <button class="secondary-action" id="fill30TablesButton" type="button">
              <span data-icon="table"></span>
              <span>補到 30 桌</span>
            </button>
            <button class="primary-action soft" id="addGuestButton" type="button">
              <span data-icon="userPlus"></span>
              <span>新增賓客</span>
            </button>
          </div>
        </header>

        <section class="metrics-grid" id="metricsGrid" aria-label="婚宴摘要"></section>

        <section class="view active" id="seatingView" aria-labelledby="viewTitle">
          <div class="planner-layout">
            <section class="workspace-panel">
              <div class="workspace-toolbar">
                <div class="segmented-control" aria-label="檢視模式">
                  <button class="active" type="button">座位圖</button>
                  <button data-view-jump="guests" type="button">清單檢視</button>
                </div>
                <div class="toolbar-cluster">
                  <label class="select-field">
                    <span>顯示</span>
                    <select id="tableVisibilityFilter">
                      <option value="all">全部桌次</option>
                      <option value="open">尚有空位</option>
                      <option value="over">超過容量</option>
                    </select>
                  </label>
                  <div class="zoom-control" aria-label="場地縮放">
                    <button class="icon-button" id="zoomOutButton" type="button" aria-label="縮小場地" title="縮小場地（⌘/Ctrl + -）">
                      <span data-icon="minus"></span>
                    </button>
                    <input id="zoomRange" type="range" min="25" max="160" step="5" value="100" aria-label="場地縮放比例" title="觸控板雙指捏合，或按住 ⌘/Ctrl 捲動縮放" />
                    <button class="icon-button" id="zoomInButton" type="button" aria-label="放大場地" title="放大場地（⌘/Ctrl + +）">
                      <span data-icon="plus"></span>
                    </button>
                    <button class="mini-button zoom-reset" id="zoomResetButton" type="button" title="回到 100%（⌘/Ctrl + 0）">
                      <span id="zoomValue">100%</span>
                    </button>
                  </div>
                  <button class="icon-button" id="resetLayoutButton" type="button" aria-label="重整桌位" title="重整桌位">
                    <span data-icon="refresh"></span>
                  </button>
                  <button class="icon-button" id="undoLayoutButton" type="button" aria-label="復原座位圖變更" title="復原座位圖變更">
                    <span data-icon="undo"></span>
                  </button>
                  <button class="icon-button" id="redoLayoutButton" type="button" aria-label="重做座位圖變更" title="重做座位圖變更">
                    <span data-icon="redo"></span>
                  </button>
                  <button class="secondary-action" id="lockLayoutButton" type="button" title="鎖定桌位與場地物件位置">
                    <span data-icon="lock"></span>
                    <span>鎖定桌位</span>
                  </button>
                  <button class="secondary-action" id="alignTablesButton" type="button" title="將接近同一列的桌位水平對齊">
                    <span data-icon="alignHorizontal"></span>
                    <span>水平對齊</span>
                  </button>
                  <button class="secondary-action" id="fitCanvasButton" type="button" title="縮放並置中顯示所有桌子">
                    <span data-icon="target"></span>
                    <span>置中</span>
                  </button>
                </div>
              </div>

              <div class="seating-canvas" id="seatingCanvas" aria-label="座位圖畫布"></div>

              <div class="canvas-footer">
                <label class="switch-row">
                  <span>顯示姓名</span>
                  <input id="showNamesToggle" type="checkbox" checked />
                </label>
                <div class="legend">
                  <span><i class="dot confirmed"></i>已回覆</span>
                  <span><i class="dot pending"></i>未回覆</span>
                  <span><i class="dot declined"></i>不參加</span>
                </div>
                <span id="layoutSavedLabel">已保存</span>
              </div>
            </section>

            <aside class="right-rail">
              <section class="rail-panel unassigned-panel" id="unassignedDropZone">
                <div class="panel-header">
                  <div>
                    <h3>待安排賓客</h3>
                    <p id="unassignedCount">0 位</p>
                  </div>
                  <button class="icon-button" id="focusUnassignedButton" type="button" aria-label="查看未安排" title="查看未安排">
                    <span data-icon="target"></span>
                  </button>
                </div>
                <label class="search-field">
                  <span data-icon="search"></span>
                  <input id="unassignedSearchInput" type="search" placeholder="搜尋姓名、電話或標籤" />
                </label>
                <div class="guest-stack" id="unassignedList"></div>
              </section>

            </aside>
          </div>
        </section>

        <section class="view" id="guestsView" aria-label="賓客名單">
          <div class="list-toolbar guest-list-toolbar" id="guestListToolbar">
            <label class="search-field">
              <span data-icon="search"></span>
              <input id="guestSearchInput" type="search" placeholder="搜尋姓名、電話、標籤或備註" />
            </label>
            <button class="secondary-action guest-filter-button" id="guestFilterButton" type="button" aria-controls="guestFilterPanel" aria-expanded="false">
              <span data-icon="settings"></span>
              <span data-filter-label>篩選</span>
            </button>
            <div class="guest-filter-panel" id="guestFilterPanel">
              <select id="rsvpFilter" aria-label="回覆狀態">
                <option value="all">全部回覆</option>
                <option value="confirmed">已回覆</option>
                <option value="pending">未回覆</option>
                <option value="declined">不參加</option>
              </select>
              <select id="assignmentFilter" aria-label="座位狀態">
                <option value="all">全部座位</option>
                <option value="assigned">已安排</option>
                <option value="unassigned">未安排</option>
              </select>
              <select id="relationFilter" aria-label="關係">
                <option value="all">全部關係</option>
                <option value="男方親友">男方親友</option>
                <option value="女方親友">女方親友</option>
              </select>
            </div>
          </div>
          <div class="data-table" id="guestTable"></div>
        </section>

        <section class="view" id="invitationsView" aria-label="喜帖管理">
          <div class="list-toolbar">
            <label class="search-field">
              <span data-icon="search"></span>
              <input id="invitationSearchInput" type="search" placeholder="搜尋姓名、電話、地址或 email" />
            </label>
            <select id="invitationTypeFilter" aria-label="喜帖篩選">
              <option value="has">有喜帖</option>
              <option value="none">無喜帖</option>
              <option value="paper">紙本</option>
              <option value="digital">電子</option>
            </select>
            <select id="invitationStatusFilter" aria-label="喜帖狀態">
              <option value="all">全部狀態</option>
              <option value="missing">待補資料</option>
              <option value="ready">待寄送</option>
              <option value="sent">已寄送</option>
              <option value="none">不需喜帖</option>
            </select>
          </div>
          <div class="data-table" id="invitationTable"></div>
        </section>

        <section class="view" id="giftsView" aria-label="禮金紀錄">
          <section class="day-mode-panel" aria-label="婚禮當天快速禮金">
            <div class="day-mode-header">
              <div>
                <p>婚禮當天模式</p>
                <h3>快速禮金登記</h3>
              </div>
              <span id="quickGiftStatus">Enter 快速新增</span>
            </div>
            <form class="quick-gift-form" id="quickGiftForm">
              <label>
                姓名或電話
                <input id="quickGiftNameInput" type="text" list="quickGiftOptions" autocomplete="off" placeholder="輸入姓名或電話" />
                <datalist id="quickGiftOptions"></datalist>
              </label>
              <label>
                金額
                <input id="quickGiftAmountInput" type="number" min="0" step="100" placeholder="3600" />
              </label>
              <div class="quick-amounts" aria-label="常用禮金金額">
                <button type="button" data-quick-amount="1200">1200</button>
                <button type="button" data-quick-amount="1600">1600</button>
                <button type="button" data-quick-amount="2000">2000</button>
                <button type="button" data-quick-amount="2600">2600</button>
                <button type="button" data-quick-amount="3200">3200</button>
                <button type="button" data-quick-amount="3600">3600</button>
                <button type="button" data-quick-amount="6000">6000</button>
              </div>
              <label>
                方式
                <select id="quickGiftMethodInput">
                  <option>現金</option>
                  <option>轉帳</option>
                  <option>支票</option>
                  <option>其他</option>
                </select>
              </label>
              <label>
                備註
                <input id="quickGiftNoteInput" type="text" placeholder="桌次、代包、收禮人" />
              </label>
              <button class="primary-action" type="submit">
                <span data-icon="cash"></span>
                <span>快速登記</span>
              </button>
            </form>
            <p class="quick-gift-hint" id="quickGiftHint">輸入賓客姓名或電話後，會自動提示桌次與重複禮金。</p>
          </section>
          <div class="list-toolbar">
            <label class="search-field">
              <span data-icon="search"></span>
              <input id="giftSearchInput" type="search" placeholder="搜尋姓名、方式或備註" />
            </label>
            <select id="giftMethodFilter" aria-label="禮金方式">
              <option value="all">全部方式</option>
              <option value="現金">現金</option>
              <option value="轉帳">轉帳</option>
              <option value="支票">支票</option>
              <option value="其他">其他</option>
            </select>
            <button class="primary-action" id="addGiftFromViewButton" type="button">
              <span data-icon="plus"></span>
              <span>新增紀錄</span>
            </button>
          </div>
          <div class="data-table" id="giftTable"></div>
        </section>

        <section class="view" id="tablesView" aria-label="桌次管理">
          <div class="table-manager" id="tableManager"></div>
        </section>
      </main>
    </div>

    <dialog class="app-dialog" id="guestDialog">
      <form class="dialog-form" id="guestForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p>賓客資料</p>
            <h3 id="guestDialogTitle">新增賓客</h3>
          </div>
          <button class="icon-button" id="closeGuestDialogButton" type="button" aria-label="關閉">
            <span data-icon="x"></span>
          </button>
        </div>
        <input name="id" type="hidden" />
        <div class="form-grid">
          <label>
            姓名
            <input name="name" type="text" placeholder="王建國" required />
          </label>
          <label>
            回覆狀態
            <select name="rsvp" required>
              <option value="confirmed">已回覆</option>
              <option value="pending">未回覆</option>
              <option value="declined">不參加</option>
            </select>
          </label>
          <label>
            同行人數
            <input name="companions" type="number" min="0" step="1" value="0" />
          </label>
          <label>
            關係
            <select name="relation" required>
              <option value="男方親友">男方親友</option>
              <option value="女方親友">女方親友</option>
            </select>
          </label>
          <label>
            兒童座椅數量
            <input name="childSeats" type="number" min="0" step="1" value="0" />
          </label>
          <label>
            素食人數
            <input name="vegetarianCount" type="number" min="0" step="1" value="0" />
          </label>
          <label>
            關係標籤
            <input name="group" type="text" placeholder="同事、親友、朋友" />
          </label>
          <label>
            電話
            <input name="phone" type="tel" placeholder="0912-345-678" />
          </label>
          <label>
            喜帖
            <select name="invitationType">
              <option value="none">無</option>
              <option value="paper">紙本</option>
              <option value="digital">電子</option>
            </select>
          </label>
          <label>
            寄送完成
            <select name="invitationDelivery">
              <option value="unsent">未寄送</option>
              <option value="sent">已寄送</option>
            </select>
          </label>
          <label>
            地址
            <input name="address" type="text" placeholder="紙本喜帖寄送地址" />
          </label>
          <label>
            Email
            <input name="email" type="email" placeholder="電子喜帖收件 email" />
          </label>
          <label>
            桌次
            <select name="tableId"></select>
          </label>
          <label class="full-field">
            備註
            <textarea name="note" rows="3" placeholder="素食、需兒童椅、長輩同行"></textarea>
          </label>
        </div>
        <div class="dialog-actions">
          <button class="danger-action ghost-danger" id="deleteGuestButton" type="button">刪除</button>
          <button class="secondary-action" id="cancelGuestButton" type="button">取消</button>
          <button class="primary-action" type="submit">
            <span data-icon="check"></span>
            <span>儲存</span>
          </button>
        </div>
      </form>
    </dialog>

    <dialog class="app-dialog compact-dialog" id="tableDialog">
      <form class="dialog-form" id="tableForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p>桌次資料</p>
            <h3 id="tableDialogTitle">新增桌次</h3>
          </div>
          <button class="icon-button" id="closeTableDialogButton" type="button" aria-label="關閉">
            <span data-icon="x"></span>
          </button>
        </div>
        <input name="id" type="hidden" />
        <div class="form-grid one-column">
          <label>
            桌號
            <input name="number" type="text" placeholder="9、A1、主桌" required />
          </label>
          <label>
            桌次別名
            <input name="alias" type="text" placeholder="女方朋友、男方同事" />
          </label>
          <label>
            容量
            <input name="capacity" type="number" min="1" step="1" value="10" required />
          </label>
          <label>
            類型
            <select name="kind">
              <option value="round">一般桌</option>
              <option value="head">主桌</option>
              <option value="family">親友桌</option>
            </select>
          </label>
        </div>
        <div class="dialog-actions">
          <button class="secondary-action" id="cancelTableButton" type="button">取消</button>
          <button class="primary-action" type="submit">
            <span data-icon="check"></span>
            <span>儲存</span>
          </button>
        </div>
      </form>
    </dialog>

    <dialog class="app-dialog compact-dialog table-guests-dialog" id="tableGuestsDialog">
      <form class="dialog-form" method="dialog">
        <div class="dialog-header">
          <div>
            <p id="tableGuestsDialogKicker">桌次賓客</p>
            <h3 id="tableGuestsDialogTitle">桌次明細</h3>
          </div>
          <button class="icon-button" id="closeTableGuestsDialogButton" type="button" aria-label="關閉">
            <span data-icon="x"></span>
          </button>
        </div>
        <div class="table-guests-overview" id="tableGuestsOverview"></div>
        <div class="table-guests-detail-list" id="tableGuestsDetailList"></div>
        <div class="dialog-actions">
          <button class="secondary-action" id="cancelTableGuestsButton" type="button">關閉</button>
        </div>
      </form>
    </dialog>

    <dialog class="app-dialog compact-dialog" id="giftDialog">
      <form class="dialog-form" id="giftForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p>禮金資料</p>
            <h3 id="giftDialogTitle">新增禮金</h3>
          </div>
          <button class="icon-button" id="closeGiftDialogButton" type="button" aria-label="關閉">
            <span data-icon="x"></span>
          </button>
        </div>
        <input name="id" type="hidden" />
        <div class="form-grid one-column">
          <label>
            賓客
            <select name="guestId"></select>
          </label>
          <label>
            登記姓名
            <input name="name" type="text" placeholder="王建國" required />
          </label>
          <label>
            金額
            <input name="amount" type="number" min="0" step="100" placeholder="3600" required />
          </label>
          <label>
            方式
            <select name="method">
              <option>現金</option>
              <option>轉帳</option>
              <option>支票</option>
              <option>其他</option>
            </select>
          </label>
          <label>
            備註
            <textarea name="note" rows="3" placeholder="第 1 桌、代包、收禮人"></textarea>
          </label>
        </div>
        <div class="dialog-actions">
          <button class="danger-action ghost-danger" id="deleteGiftButton" type="button">刪除</button>
          <button class="secondary-action" id="cancelGiftButton" type="button">取消</button>
          <button class="primary-action" type="submit">
            <span data-icon="check"></span>
            <span>儲存</span>
          </button>
        </div>
      </form>
    </dialog>

    <dialog class="confirm-dialog" id="confirmDialog">
      <form class="confirm-form" id="confirmForm" method="dialog">
        <div class="confirm-icon" id="confirmIcon" aria-hidden="true"></div>
        <div>
          <p id="confirmKicker">確認動作</p>
          <h3 id="confirmTitle">確定要更新？</h3>
          <span id="confirmMessage"></span>
        </div>
        <div class="dialog-actions">
          <button class="secondary-action" id="cancelConfirmButton" type="button">取消</button>
          <button class="danger-action" id="confirmActionButton" type="submit">確認</button>
        </div>
      </form>
    </dialog>

    <dialog class="app-dialog compact-dialog" id="snapshotDialog">
      <form class="dialog-form" method="dialog">
        <div class="dialog-header">
          <div>
            <p>資料安全</p>
            <h3>自動快照</h3>
          </div>
          <button class="icon-button" id="closeSnapshotDialogButton" type="button" aria-label="關閉">
            <span data-icon="x"></span>
          </button>
        </div>
        <div class="snapshot-list" id="snapshotList"></div>
        <div class="dialog-actions">
          <button class="secondary-action" id="cancelSnapshotButton" type="button">關閉</button>
        </div>
      </form>
    </dialog>

    <dialog class="app-dialog" id="settingsDialog">
      <form class="dialog-form" id="settingsForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p>系統設定</p>
            <h3>基本資訊</h3>
          </div>
          <button class="icon-button" id="closeSettingsDialogButton" type="button" aria-label="關閉">
            <span data-icon="x"></span>
          </button>
        </div>
        <div class="form-grid">
          <label>
            資訊標題
            <input name="label" type="text" placeholder="婚禮資訊" />
          </label>
          <label>
            婚禮名稱
            <input name="name" type="text" placeholder="文定 & 婚宴" required />
          </label>
          <label>
            日期時間
            <input name="date" type="text" placeholder="2026/11/21 18:00" />
          </label>
          <label>
            顯示頭像字
            <input name="avatar" type="text" maxlength="2" placeholder="林" />
          </label>
          <label class="full-field">
            地點
            <input name="venue" type="text" placeholder="台北文華東方酒店 3F 宴會廳" />
          </label>
          <label>
            顯示名稱
            <input name="coupleName" type="text" placeholder="林小美 & 陳大明" />
          </label>
        </div>
        <div class="dialog-actions">
          <button class="secondary-action" id="cancelSettingsButton" type="button">取消</button>
          <button class="primary-action" type="submit">
            <span data-icon="check"></span>
            <span>儲存設定</span>
          </button>
        </div>
      </form>
    </dialog>

    <dialog class="app-dialog" id="cloudSyncDialog">
      <form class="dialog-form" id="cloudSyncForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p>跨裝置資料</p>
            <h3>雲端同步</h3>
          </div>
          <button class="icon-button" id="closeCloudSyncDialogButton" type="button" aria-label="關閉">
            <span data-icon="x"></span>
          </button>
        </div>
        <div class="form-grid">
          <label class="full-field">
            Supabase Project URL
            <input name="url" type="url" placeholder="https://xxxx.supabase.co" />
          </label>
          <label class="full-field">
            Supabase anon public key
            <input name="anonKey" type="password" placeholder="eyJhbGciOi..." autocomplete="off" />
          </label>
          <label>
            同步代碼
            <input name="syncKey" type="password" placeholder="只給自己和伴侶知道" autocomplete="off" />
          </label>
          <label class="checkbox-field">
            <input name="autoSync" type="checkbox" />
            <span>自動同步</span>
          </label>
        </div>
        <p class="cloud-sync-message" id="cloudSyncMessage">尚未設定雲端同步。</p>
        <div class="dialog-actions split-actions">
          <button class="danger-action ghost-danger" id="clearCloudSyncButton" type="button">清除設定</button>
          <button class="secondary-action" id="pullCloudButton" type="button">
            <span data-icon="download"></span>
            <span>下載雲端</span>
          </button>
          <button class="secondary-action" id="pushCloudButton" type="button">
            <span data-icon="upload"></span>
            <span>上傳本機</span>
          </button>
          <button class="primary-action" type="submit">
            <span data-icon="check"></span>
            <span>儲存設定</span>
          </button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js?v=wedding-planner-36"></script>
  </body>
</html>
